<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cuaca Medan Hari Ini - Info Akurat Terkini</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      min-height: 100vh;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
  </style>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WeatherForecast",
    "name": "Prakiraan Cuaca Medan Terkini",
    "url": "https://cuacaindo-terkini.netlify.app/medan",
    "description": "Informasi prakiraan cuaca Kota Medan hari ini secara real-time, akurat, langsung dari data satelit.",
    "provider": {
      "@type": "Organization",
      "name": "CuacaIndo",
      "url": "https://cuacaindo-terkini.netlify.app/"
    }
  }
  </script>
</head>
<body class="text-white antialiased flex flex-col justify-between min-h-screen">

  <nav class="max-w-6xl w-full mx-auto px-6 py-6 flex justify-between items-center">
    <div class="flex items-center space-x-2">
      <span class="text-2xl font-bold tracking-tight">Cuaca<span class="text-[#00c9b1]">Indo</span></span>
    </div>
    <a href="/" class="text-sm font-medium text-gray-400 hover:text-[#00c9b1] transition flex items-center space-x-1">
      <span>⬅ Kembali ke Beranda</span>
    </a>
  </nav>

  <main class="max-w-4xl w-full mx-auto px-4 flex-grow flex flex-col justify-center items-center py-10">
    
    <div class="text-center mb-8">
      <h1 class="text-4xl md:text-5xl font-bold mb-3">Cuaca <span class="text-[#00c9b1]">Medan</span> Hari Ini</h1>
      <p class="text-gray-400 text-sm md:text-base">Prakiraan cuaca Kota Medan Sumatera Utara real-time langsung dari satelit</p>
    </div>

    <div class="glass-card w-full max-w-2xl rounded-3xl p-8 md:p-10 shadow-2xl relative overflow-hidden">
      
      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-6 mb-8">
        <div>
          <h2 class="text-2xl md:text-3xl font-bold mb-1">Medan, Sumatera Utara, ID <span class="text-sm text-gray-500 font-normal">ID</span></h2>
          <p id="mdn-desc" class="text-[#00c9b1] text-lg font-medium tracking-wide">Memuat Data...</p>
        </div>
        <div class="flex items-center space-x-4">
          <div id="mdn-icon" class="text-6xl md:text-7xl filter drop-shadow-md">☁️</div>
          <div id="mdn-temp" class="text-6xl md:text-7xl font-bold tracking-tighter">--°C</div>
        </div>
      </div>

      <div class="grid grid-cols-3 gap-4 border-t border-gray-800/60 pt-6">
        <div class="bg-white/5 rounded-xl p-4 text-center">
          <span id="mdn-humidity" class="text-xl md:text-2xl font-bold text-[#00c9b1] block">--%</span>
          <p class="text-gray-400 text-xs mt-1">💧 Kelembaban</p>
        </div>
        <div class="bg-white/5 rounded-xl p-4 text-center">
          <span id="mdn-wind" class="text-xl md:text-2xl font-bold text-[#00c9b1] block">-- km/j</span>
          <p class="text-gray-400 text-xs mt-1">💨 Angin</p>
        </div>
        <div class="bg-white/5 rounded-xl p-4 text-center">
          <span id="mdn-feels" class="text-xl md:text-2xl font-bold text-[#00c9b1] block">--°C</span>
          <p class="text-gray-400 text-xs mt-1">🌡️ Terasa</p>
        </div>
      </div>

    </div>

  </main>

  <footer class="w-full text-center py-6 border-t border-gray-900/40 bg-black/10">
    <p class="text-xs text-gray-500">&copy; 2026 <strong>CuacaIndo</strong> – Data Akurat Medan Terkini</p>
  </footer>

  <script>
    // FIXED: Using your active OpenWeather API Key
    const API_KEY = '82be2db14f9b737940ac1a0e8f3c93a7';

    function getIcon(code, iconStr) {
      if(!code) return '☁️';
      const c = String(code);
      if(c.startsWith('2')) return '⛈️';
      if(c.startsWith('3')) return '🌧️';
      if(c.startsWith('5')) return '🌧️';
      if(c.startsWith('6')) return '❄️';
      if(c.startsWith('7')) return '🌫️';
      if(c === '800') return iconStr && iconStr.includes('n') ? '🌙' : '☀️';
      return '☁️';
    }

    function descID(desc) {
      const map = {
        'clear sky': 'Cerah', 'few clouds': 'Berawan Sebagian',
        'scattered clouds': 'Berawan', 'broken clouds': 'Berawan Tebal',
        'overcast clouds': 'Mendung', 'light rain': 'Hujan Ringan',
        'moderate rain': 'Hujan Sedang', 'heavy intensity rain': 'Hujan Lebat',
        'mist': 'Berkabut', 'thunderstorm': 'Badai Petir'
      };
      return map[desc.toLowerCase()] || desc;
    }

    async function fetchMedan() {
      try {
        // FIXED syntax: changed 'id&appid=' to 'q=Medan,id&appid='
        const r = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=Medan,id&appid=${API_KEY}&units=metric&lang=id`);
        if(!r.ok) return;
        const d = await r.json();

        // Safely map incoming live parameters directly onto correct component targets
        if(document.getElementById('mdn-icon')) document.getElementById('mdn-icon').textContent = getIcon(d.weather[0].id, d.weather[0].icon);
        if(document.getElementById('mdn-temp')) document.getElementById('mdn-temp').textContent = Math.round(d.main.temp) + '°C';
        if(document.getElementById('mdn-desc')) document.getElementById('mdn-desc').textContent = descID(d.weather[0].description);
        if(document.getElementById('mdn-humidity')) document.getElementById('mdn-humidity').textContent = d.main.humidity + '%';
        if(document.getElementById('mdn-wind')) document.getElementById('mdn-wind').textContent = Math.round(d.wind.speed * 3.6) + ' km/j';
        if(document.getElementById('mdn-feels')) document.getElementById('mdn-feels').textContent = Math.round(d.main.feels_like) + '°C';

      } catch(e) {
        console.log("Error processing dashboard component:", e);
      }
    }

    // Execute engine when elements are loaded safely
    window.addEventListener('DOMContentLoaded', fetchMedan);
  </script>
</body>
</html>
