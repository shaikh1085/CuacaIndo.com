<!DOCTYPE html>
<html lang="id">
<head>
 <meta name="google-site-verification" content="3pPVFYIT2lG94-KYpLg-Y9y0SgXbZf68J8vB5W2vA_U" />
  <meta name="monetag" content="93ac63f4b4288fac61931aa704d1c102">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CuacaIndo – Informasi Cuaca Indonesia Terkini</title>
  <meta name="description" content="Cek cuaca terkini di seluruh kota Indonesia. Prakiraan cuaca akurat untuk Jakarta, Surabaya, Bali, Medan, Bandung dan kota lainnya."/>
  <meta name="keywords" content="cuaca indonesia, prakiraan cuaca, cuaca hari ini, cuaca jakarta, cuaca bali, cuaca surabaya"/>
  <meta name="google-site-verification" content="lDkeLgJ6gZ99UYpsG2w_Vr89mM_IDTf9K4AciHzUC0E" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --sky: #0a1628; --teal: #00c9b1; --teal2: #00e5cc;
      --gold: #f5c842; --coral: #ff7e67; --white: #f0f6ff;
      --muted: #7a9cc0; --card: rgba(255,255,255,0.05);
      --card-border: rgba(0,201,177,0.2);
    }
    * { margin:0; padding:0; box-sizing:border-box; outline:none; }
    body {
      font-family:'DM Sans',sans-serif; background:var(--sky); color:var(--white);
      min-height:100vh; overflow-x:hidden; position:relative;
    }
    .wrapper { position:relative; z-index:1; max-width:1100px; margin:0 auto; padding:20px; }
    
    /* Header with 5 Links */
    header { 
      display:flex; justify-content:space-between; align-items:center; 
      padding:20px 0; border-bottom:1px solid var(--card-border); 
      flex-wrap: wrap; gap: 15px;
    }
    .logo { font-family:'Playfair Display',serif; font-size:1.8rem; text-decoration:none; color:white; font-weight:900; }
    .logo span { color:var(--teal); }
    
    nav { display: flex; gap: 12px; }
    nav a { 
      color: var(--muted); text-decoration: none; font-size: 0.85rem; font-weight: 500;
      transition: 0.3s; padding: 6px 12px; border-radius: 20px; border: 1px solid transparent;
    }
    nav a:hover { color: var(--teal); border-color: var(--card-border); background: rgba(0,201,177,0.05); }

    .hero { text-align:center; padding:60px 0 30px; }
    .hero h1 { font-family:'Playfair Display',serif; font-size:3.5rem; margin-bottom:15px; }
    .hero span { color: var(--teal); }

    .controls { display:flex; flex-direction:column; align-items:center; gap:15px; margin-bottom:40px; }
    .search-box { 
      background:rgba(255,255,255,0.05); border:1px solid var(--card-border); 
      padding:8px; border-radius:50px; display:flex; width:100%; max-width:500px; backdrop-filter:blur(10px); 
    }
    .search-box input { background:transparent; border:none; color:white; padding:10px 20px; flex:1; font-size:1rem; }
    .search-box button { 
      background:var(--teal); border:none; color:var(--sky); padding:10px 25px; 
      border-radius:50px; font-weight:700; cursor:pointer; transition:0.3s;
    }

    /* Main Card */
    #main-display { display:none; margin-bottom:60px; animation:fadeIn 0.6s ease forwards; }
    .main-card {
      background:linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
      border:1px solid var(--card-border); border-radius:40px; padding:40px; backdrop-filter:blur(20px);
    }
    .main-grid { display:grid; grid-template-columns: 1.2fr 1fr; gap:30px; align-items:center; }
    .temp-huge { font-size:7rem; font-weight:300; color: var(--teal2); line-height:1; }
    
    /* Share Buttons Style */
    .share-box { 
      margin-top: 25px; display: flex; align-items: center; gap: 10px; 
      padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); 
    }
    .share-btn {
      padding: 8px 16px; border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 0.8rem;
      transition: 0.3s; display: inline-flex; align-items: center; gap: 5px;
    }
    .btn-wa { background: #25D366; color: white; }
    .btn-tw { background: #000; color: white; border: 1px solid #333; }

    .details-grid { display:grid; grid-template-columns: 1fr 1fr; gap:15px; }
    .detail-item { background:rgba(255,255,255,0.03); padding:15px; border-radius:20px; border: 1px solid rgba(255,255,255,0.05); }
    .detail-label { font-size:0.7rem; color:var(--muted); text-transform:uppercase; display:block; }
    .detail-value { font-size:1.1rem; font-weight:600; color:var(--white); }

    .city-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap:20px; margin-top: 20px; }
    .city-card {
      background:var(--card); border:1px solid var(--card-border); padding:25px; border-radius:30px;
      text-align:center; transition: 0.3s; cursor:pointer;
    }
    .city-card:hover { transform:translateY(-8px); border-color:var(--teal); background:rgba(0,201,177,0.1); }

    footer { text-align:center; padding:40px 0; color:var(--muted); font-size:0.8rem; border-top:1px solid var(--card-border); margin-top:50px; }
    @keyframes fadeIn { from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:translateY(0)} }

    @media (max-width: 768px) {
      .main-grid { grid-template-columns: 1fr; text-align: center; }
      nav { justify-content: center; width: 100%; }
      .hero h1 { font-size: 2.5rem; }
    }
  </style>
</head>
<body>

<div class="wrapper">
  <header>
    <a href="index.html" class="logo">Cuaca<span>Indo</span></a>
    <nav>
        <a href="javascript:void(0)" onclick="fetchByName('Jakarta')">Jakarta</a>
        <a href="javascript:void(0)" onclick="fetchByName('Bali')">Bali</a>
        <a href="javascript:void(0)" onclick="fetchByName('Surabaya')">Surabaya</a>
        <a href="javascript:void(0)" onclick="fetchByName('Bandung')">Bandung</a>
        <a href="javascript:void(0)" onclick="fetchByName('Medan')">Medan</a>
    </nav>
  </header>

  <div class="hero">
    <h1>Cuaca Hari Ini <span>Indonesia</span></h1>
    <p>Dapatkan informasi prakiraan cuaca akurat secara real-time.</p>
    
    <div class="controls">
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Cari kota (Contoh: Jakarta)..." />
            <button onclick="searchCity()">Cari</button>
        </div>
    </div>
  </div>

  <div id="main-display">
    <div class="main-card">
      <div class="main-grid">
        <div class="city-info">
            <h2 id="m-city">Nama Kota</h2>
            <div id="m-desc" style="color:var(--teal); font-size:1.2rem; margin-bottom:10px;">Cerah</div>
            <div class="temp-huge" id="m-temp">--°</div>
            
            <div class="share-box">
                <span style="font-size:0.8rem; color:var(--muted);">Bagikan:</span>
                <a href="#" id="share-wa" class="share-btn btn-wa" target="_blank">WhatsApp</a>
                <a href="#" id="share-tw" class="share-btn btn-tw" target="_blank">Twitter</a>
            </div>
        </div>
        <div class="details-grid">
            <div class="detail-item"><span class="detail-label">Terasa</span><span class="detail-value" id="m-feels">--°C</span></div>
            <div class="detail-item"><span class="detail-label">Lembab</span><span class="detail-value" id="m-hum">--%</span></div>
            <div class="detail-item"><span class="detail-label">Angin</span><span class="detail-value" id="m-wind">-- km/h</span></div>
            <div class="detail-item"><span class="detail-label">Tekanan</span><span class="detail-value" id="m-press">-- hPa</span></div>
        </div>
      </div>
    </div>
  </div>

  <h3 style="margin-bottom:20px; font-family:'Playfair Display';">Kota Populer</h3>
  <div class="city-grid" id="city-grid"></div>

  <footer>
    &copy; 2024 CuacaIndo. Dikelola untuk akurasi data cuaca.
  </footer>
</div>

<script>
  const API_KEY = "82be2db14f9b737940ac1a0e8f3c93a7";
  const CITIES = [
    { name: "Jakarta", id: "1642911" },
    { name: "Surabaya", id: "1625822" },
    { name: "Bandung", id: "1649082" },
    { name: "Medan", id: "1214520" },
    { name: "Denpasar", id: "1645528" }
  ];

  async function fetchByName(name) {
    try {
      const r = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${name},ID&appid=${API_KEY}&units=metric&lang=id`);
      const data = await r.json();
      if(data.cod === 200) showMain(data);
      else alert("Kota tidak ditemukan.");
    } catch(e) { alert("Error koneksi."); }
  }

  async function fetchById(id) {
    const r = await fetch(`https://api.openweathermap.org/data/2.5/weather?id=${id}&appid=${API_KEY}&units=metric&lang=id`);
    return await r.json();
  }

  function showMain(d) {
    document.getElementById('main-display').style.display = 'block';
    document.getElementById('m-city').textContent = d.name;
    document.getElementById('m-desc').textContent = d.weather[0].description;
    const temp = Math.round(d.main.temp);
    document.getElementById('m-temp').textContent = temp + "°";
    document.getElementById('m-feels').textContent = Math.round(d.main.feels_like) + "°C";
    document.getElementById('m-hum').textContent = d.main.humidity + "%";
    document.getElementById('m-wind').textContent = d.wind.speed + " m/s";
    document.getElementById('m-press').textContent = d.main.pressure + " hPa";

    // Dynamic Social Share
    const text = `Cuaca di ${d.name} saat ini ${d.weather[0].description} (${temp}°C). Cek info lengkapnya di CuacaIndo!`;
    const url = window.location.href;
    document.getElementById('share-wa').href = `https://api.whatsapp.com/send?text=${encodeURIComponent(text + " " + url)}`;
    document.getElementById('share-tw').href = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`;
    
    window.scrollTo({ top: 300, behavior: 'smooth' });
  }

  function searchCity() {
    const val = document.getElementById('search-input').value;
    if(val) fetchByName(val);
  }

  function init() {
    const grid = document.getElementById('city-grid');
    CITIES.forEach(c => {
      const card = document.createElement('div');
      card.className = 'city-card';
      card.innerHTML = `<div style="font-size:2rem; margin-bottom:10px;">🌤️</div><strong>${c.name}</strong><div id="t-${c.id}">...</div>`;
      card.onclick = () => fetchByName(c.name);
      grid.appendChild(card);
      fetchById(c.id).then(d => {
          document.getElementById(`t-${c.id}`).textContent = Math.round(d.main.temp) + "°C";
      });
    });
  }
  
  window.onload = init;
</script>
</body>
</html>
